app = "aai-medical-scribe-pipecat-client"
primary_region = "iad"

[deploy]
  max_per_region = 1
  strategy = "immediate"

[build]
  [build.args]
    NEXT_PUBLIC_BACKEND_URL = "https://aai-medical-scribe-pipecat.fly.dev"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 50
    soft_limit = 25

  [[http_service.checks]]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    timeout = "5s"
    path = "/"

[[vm]]
  memory = "1024mb"
  cpu_kind = "shared"
  cpus = 2
